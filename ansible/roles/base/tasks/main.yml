---
- name: Instalar pacotes essenciais
  apt:
    name:
      - cifs-utils
      - curl
      - wget
      - unzip
      - git
      - xz-utils
      - ca-certificates
    state: present

- name: Criar ponto de montagem do TrueNAS
  file:
    path: "{{ smb_mount_point }}"
    state: directory
    mode: '0755'

- name: Montar compartilhamento SMB do TrueNAS
  mount:
    path: "{{ smb_mount_point }}"
    src: "//{{ truenas_server }}/{{ truenas_share }}"
    fstype: cifs
    opts: "username={{ truenas_user }},password={{ truenas_pass }},uid=root,gid=root,file_mode=0755,dir_mode=0755,vers=3.0"
    state: mounted

- name: Confirmar que os arquivos estão acessíveis
  stat:
    path: "{{ smb_mount_point }}/Marcos/Linux/java/jdk-17.0.14_linux-x64_bin.tar.gz"
  register: java_file_check

- name: Falhar se arquivo do Java não for encontrado
  fail:
    msg: "Arquivo do Java não encontrado no TrueNAS. Verifique o caminho e as credenciais."
  when: not java_file_check.stat.exists