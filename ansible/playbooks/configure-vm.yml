---
- name: Configurar VM de aplicação
  hosts: app_servers
  become: true
  vars:
    app_user: "mvrc"
    app_dir: "/opt/app"

  pre_tasks:
    - name: Aguardar SSH ficar disponível
      wait_for_connection:
        delay: 10
        timeout: 120

    - name: Atualizar cache de pacotes
      apt:
        update_cache: yes
        cache_valid_time: 3600

  roles:
    - base
    - java
    - nodejs
    - nginx
    - app-user